<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agente · Team Scaglia</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary:    #253C64;
            --accent:     #626970;
            --border:     #e0e0e0;
            --text:       #2a2a2a;
            --text-light: #626970;
            --bg:         #ffffff;
            --bg-off:     #f8f7f5;
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Montserrat', sans-serif;
            color: var(--text);
            background: var(--bg);
        }

        /* NAVBAR */
        nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            height: 64px;
            padding: 0 48px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.97);
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(12px);
        }

        .nav-logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 20px;
            font-weight: 600;
            color: var(--primary);
            text-decoration: none;
            letter-spacing: 0.05em;
        }

        .nav-back {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--text-light);
            text-decoration: none;
            transition: color 0.3s;
        }

        .nav-back:hover { color: var(--primary); }

        /* HERO AGENTE */
        .agent-hero {
            margin-top: 64px;
            background: var(--primary);
            padding: 72px 48px;
            display: flex;
            align-items: center;
            gap: 48px;
        }

        .agent-avatar {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            overflow: hidden;
            flex-shrink: 0;
            border: 3px solid rgba(255,255,255,0.2);
        }

        .agent-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(15%);
        }

        .agent-avatar-placeholder {
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Cormorant Garamond', serif;
            font-size: 52px;
            font-weight: 300;
            color: rgba(255,255,255,0.4);
        }

        .agent-info { flex: 1; }

        .agent-role {
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.5);
            margin-bottom: 12px;
        }

        .agent-name {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(36px, 5vw, 56px);
            font-weight: 400;
            color: white;
            line-height: 1.1;
            margin-bottom: 24px;
        }

        .agent-contacts {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .agent-contact-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            text-decoration: none;
            padding: 12px 24px;
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            transition: all 0.3s;
        }

        .agent-contact-btn:hover {
            background: rgba(255,255,255,0.1);
            border-color: white;
        }

        .agent-contact-btn.whatsapp {
            background: #25D366;
            border-color: #25D366;
        }

        .agent-contact-btn.whatsapp:hover {
            background: #1fb855;
            border-color: #1fb855;
        }

        /* PROPIEDADES */
        .props-section {
            padding: 80px 48px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .section-label {
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 16px;
        }

        .section-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(32px, 4vw, 48px);
            font-weight: 400;
            color: var(--text);
            margin-bottom: 48px;
            line-height: 1.1;
        }

        .section-title em { font-style: italic; color: var(--accent); }

        .props-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2px;
            background: var(--border);
            border: 1px solid var(--border);
        }

        .prop-card {
            background: var(--bg);
            overflow: hidden;
            transition: background 0.3s;
            cursor: pointer;
        }

        .prop-card:hover { background: var(--bg-off); }

        .prop-image {
            width: 100%;
            aspect-ratio: 4/3;
            background: var(--bg-off);
            overflow: hidden;
            position: relative;
        }

        .prop-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s;
        }

        .prop-card:hover .prop-image img { transform: scale(1.04); }

        .prop-image-placeholder {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--primary), #1a2847);
        }

        .prop-badge {
            position: absolute;
            top: 14px;
            left: 14px;
            font-size: 9px;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: white;
            background: var(--primary);
            padding: 4px 10px;
        }

        .prop-status {
            position: absolute;
            top: 14px;
            right: 14px;
            font-size: 9px;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 4px 10px;
        }

        .prop-info { padding: 22px 24px 26px; }

        .prop-type {
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 6px;
        }

        .prop-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 19px;
            font-weight: 500;
            color: var(--text);
            margin-bottom: 4px;
            line-height: 1.3;
        }

        .prop-neighborhood {
            font-size: 11px;
            color: var(--text-light);
            margin-bottom: 14px;
        }

        .prop-price {
            font-family: 'Cormorant Garamond', serif;
            font-size: 22px;
            font-weight: 400;
            color: var(--primary);
        }

        .prop-expenses {
            font-size: 11px;
            color: var(--text-light);
            margin-top: 2px;
        }

        /* LOADING */
        .loading {
            padding: 80px;
            text-align: center;
        }

        .loading-spinner {
            width: 32px;
            height: 32px;
            border: 2px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading p {
            font-size: 12px;
            color: var(--text-light);
            letter-spacing: 0.1em;
        }

        /* ERROR */
        .error-msg {
            padding: 48px;
            text-align: center;
            color: var(--text-light);
            font-size: 13px;
        }

        /* NO PROPS */
        .no-props {
            grid-column: 1/-1;
            padding: 64px;
            text-align: center;
            font-size: 13px;
            color: var(--text-light);
        }

        /* FOOTER */
        footer {
            background: #0a0a0a;
            padding: 32px 48px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .footer-logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 16px;
            font-weight: 500;
            color: rgba(255,255,255,0.3);
        }

        .footer-copy {
            font-size: 10px;
            color: #333;
            letter-spacing: 0.05em;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            nav { padding: 0 20px; }
            .agent-hero { padding: 48px 20px; flex-direction: column; gap: 24px; }
            .agent-avatar { width: 100px; height: 100px; }
            .props-section { padding: 48px 20px; }
            footer { padding: 24px 20px; flex-direction: column; gap: 12px; }
        }
    </style>
</head>
<body>

    <!-- NAVBAR -->
    <nav>
        <a href="/" class="nav-logo">Team Scaglia</a>
        <a href="/#equipo" class="nav-back">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M19 12H5M5 12l7-7M5 12l7 7"/></svg>
            Volver al equipo
        </a>
    </nav>

    <!-- HERO AGENTE -->
    <div class="agent-hero" id="agentHero">
        <div class="agent-avatar" id="agentAvatar">
            <div class="agent-avatar-placeholder" id="agentInitials">...</div>
        </div>
        <div class="agent-info">
            <div class="agent-role">Agente Inmobiliario · Team Scaglia</div>
            <h1 class="agent-name" id="agentName">Cargando...</h1>
            <div class="agent-contacts" id="agentContacts"></div>
        </div>
    </div>

    <!-- PROPIEDADES -->
    <div class="props-section">
        <p class="section-label">Cartera de propiedades</p>
        <h2 class="section-title">Propiedades <em>activas</em></h2>
        <div id="propsContainer">
            <div class="loading">
                <div class="loading-spinner"></div>
                <p>Cargando propiedades...</p>
            </div>
        </div>
    </div>

    <!-- FOOTER -->
    <footer>
        <span class="footer-logo">Team Scaglia</span>
        <span class="footer-copy">© 2026 · Red Suma · Buenos Aires</span>
    </footer>

    <script>
        // Datos del equipo (mismo array que index.html)
        const equipo = [
            { slug: 'guillermo-scaglia', nombre: 'Guillermo Scaglia', rol: 'Broker Partner', email: 'gscaglia@redsuma.com.ar', telefono: '+54 (11) 3097-7868', whatsapp: '541130977868', ig: 'guillermoscaglia', avatar: null },
            { slug: 'giuliano-larroca',  nombre: 'Giuliano Larroca',  rol: 'Agente Inmobiliario', email: 'glarroca@redsuma.com.ar', telefono: '+54 (11) 5843-3676', whatsapp: '541158433676', ig: null, avatar: 'https://0dihwhumgqhgj14n.public.blob.vercel-storage.com/agents/5600b94a-aae2-4b59-99a5-7b5ab12b2d72/avatar.jpg' },
            { slug: 'luciano-perez',     nombre: 'Luciano Pérez',     rol: 'Agente Inmobiliario', email: 'lperezmango@redsuma.com.ar', telefono: '+54 (11) 6987-6997', whatsapp: '541169876997', ig: null, avatar: 'https://0dihwhumgqhgj14n.public.blob.vercel-storage.com/agents/e7492f1b-b5d9-4f3b-8b48-8d083cfd49dc/avatar.jpg' },
            { slug: 'carolina-klachko', nombre: 'Carolina Klachko', rol: 'Agente Inmobiliario', email: 'carolinak@redsuma.com.ar', telefono: '+54 (11) 5859-8204', whatsapp: '541158598204', ig: null, avatar: 'https://0dihwhumgqhgj14n.public.blob.vercel-storage.com/agents/d49c2893-aaaf-49e2-b2be-c71bfa38d4d5/avatar.jpeg' },
            { slug: 'federico-susemihl', nombre: 'Federico Susemihl', rol: 'Agente Inmobiliario', email: 'fsusemihl@redsuma.com.ar', telefono: '+54 (11) 5746-3477', whatsapp: '541157463477', ig: 'fedesuse.suma', avatar: 'https://0dihwhumgqhgj14n.public.blob.vercel-storage.com/agents/f6fd5b8f-fad3-4299-998b-c1053418b3dc/avatar-1779972894388.jpeg' },
            { slug: 'talia-larroca',    nombre: 'Talia Larroca',    rol: 'Agente Inmobiliario', email: 'tlarroca@redsuma.com.ar', telefono: '+54 (11) 5738-0298', whatsapp: '541157380298', ig: null, avatar: null },
            { slug: 'cecilia-paul',     nombre: 'Cecilia Paul',     rol: 'Agente Inmobiliario', email: 'cpaul@redsuma.com.ar', telefono: '+54 (11) 3683-6444', whatsapp: '541136836444', ig: null, avatar: 'https://0dihwhumgqhgj14n.public.blob.vercel-storage.com/agents/0449e460-9488-4d69-963c-9d3d948008d6/avatar-1776735678425.jpeg' },
            { slug: 'irene-ruiz-diaz',  nombre: 'Irene Ruiz Diaz',  rol: 'Agente Inmobiliario', email: 'iruizdiaz@redsuma.com.ar', telefono: '+54 (11) 3251-4010', whatsapp: '541132514010', ig: null, avatar: 'https://0dihwhumgqhgj14n.public.blob.vercel-storage.com/agents/17fdafed-11c4-40f4-aa25-bad0411c8eb0/avatar-1776868542793.jpeg' },
        ];

        // Obtener slug de la URL
        const params  = new URLSearchParams(window.location.search);
        const slug    = params.get('slug');
        const agent   = equipo.find(a => a.slug === slug);

        // Actualizar título
        if (agent) {
            document.title = agent.nombre + ' · Team Scaglia';
            document.getElementById('agentName').textContent = agent.nombre;

            // Rol
            document.querySelector('.agent-role').textContent = agent.rol + ' · Team Scaglia';

            // Avatar
            const avatarEl = document.getElementById('agentAvatar');
            if (agent.avatar) {
                avatarEl.innerHTML = `<img src="${agent.avatar}" alt="${agent.nombre}">`;
            } else {
                const initials = agent.nombre.split(' ').map(w => w[0]).join('').substring(0, 2);
                document.getElementById('agentInitials').textContent = initials;
            }

            // Contactos
            const contactsEl = document.getElementById('agentContacts');
            contactsEl.innerHTML = `
                <a href="https://wa.me/${agent.whatsapp}" target="_blank" class="agent-contact-btn whatsapp">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.126.554 4.118 1.521 5.851L.057 23.882l6.198-1.427A11.946 11.946 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818a9.818 9.818 0 01-5.002-1.371l-.36-.214-3.681.847.878-3.566-.234-.368A9.818 9.818 0 012.182 12C2.182 6.579 6.579 2.182 12 2.182S21.818 6.579 21.818 12 17.421 21.818 12 21.818z"/></svg>
                    WhatsApp
                </a>
                <a href="mailto:${agent.email}" class="agent-contact-btn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5"><path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                    Email
                </a>
                ${agent.ig ? `<a href="https://instagram.com/${agent.ig}" target="_blank" class="agent-contact-btn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="0.5" fill="white"/></svg>
                    Instagram
                </a>` : ''}
            `;
        } else if (!slug) {
            window.location.href = '/';
        }

        // Cargar propiedades
        async function loadProperties() {
            const container = document.getElementById('propsContainer');
            try {
                const res  = await fetch('/api/agent-properties?slug=' + slug);
                const data = await res.json();
                const props = data.properties || [];

                if (!props.length) {
                    container.innerHTML = `<div class="props-grid"><p class="no-props">Este agente no tiene propiedades publicadas en este momento.</p></div>`;
                    return;
                }

                container.innerHTML = `<div class="props-grid">${props.map(p => `
                    <div class="prop-card">
                        <div class="prop-image">
                            ${p.image
                                ? `<img src="${p.image}" alt="${p.title}" loading="lazy">`
                                : `<div class="prop-image-placeholder"></div>`
                            }
                            ${p.operation ? `<span class="prop-badge">${p.operation}</span>` : ''}
                            ${p.status    ? `<span class="prop-status">${p.status}</span>` : ''}
                        </div>
                        <div class="prop-info">
                            ${p.type ? `<div class="prop-type">${p.type}</div>` : ''}
                            <div class="prop-title">${p.title}</div>
                            ${p.neighborhood ? `<div class="prop-neighborhood">${p.neighborhood}</div>` : ''}
                            <div class="prop-price">${p.price}</div>
                            ${p.expenses ? `<div class="prop-expenses">+ ${p.expenses} expensas</div>` : ''}
                        </div>
                    </div>
                `).join('')}</div>`;

            } catch(e) {
                container.innerHTML = `<div class="error-msg">No se pudieron cargar las propiedades. Intentá de nuevo más tarde.</div>`;
            }
        }

        if (slug) loadProperties();
    </script>
</body>
</html>
